<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head><title>VibeRide</title><link rel="stylesheet" href="/css/style.css"></head><body><div class="container"><h1>Edit User</h1><a class="btn secondary" href="/users">Back</a><div th:if="${type=='PASSENGER'}"><form action="/users/update/passenger" method="post"><input name="userId" th:value="${user.userId}" readonly><input name="name" th:value="${user.name}" required><input name="email" th:value="${user.email}" required><input name="password" th:value="${user.password}" required><input name="phone" th:value="${user.phone}" required><input name="date" type="date" th:value="${user.registeredDate}" required><input name="address" th:value="${passenger.address}" required><input name="preferredPayment" th:value="${passenger.preferredPayment}" required><button class="btn" type="submit">Update</button></form></div><div th:if="${type=='PREMIUM'}"><form action="/users/update/premium" method="post"><input name="userId" th:value="${user.userId}" readonly><input name="name" th:value="${user.name}" required><input name="email" th:value="${user.email}" required><input name="password" th:value="${user.password}" required><input name="phone" th:value="${user.phone}" required><input name="date" type="date" th:value="${user.registeredDate}" required><input name="membershipLevel" th:value="${premiumPassenger.membershipLevel}" required><input name="discountRate" type="number" step="0.01" th:value="${premiumPassenger.discountRate}" required><input name="loyaltyPoints" type="number" th:value="${premiumPassenger.loyaltyPoints}" required><button class="btn" type="submit">Update</button></form></div></div></body></html>
