<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: html(~{::title}, ~{::main})}">
<head>
    <title th:fragment="title">TaxiGo – Passenger Profile</title>
</head>
<main th:fragment="main" class="bg-slate-950 text-slate-100 min-h-screen py-16 relative overflow-hidden">
    <!-- Glowing background accents -->
    <div class="absolute w-[450px] h-[450px] rounded-full bg-purple-500/10 blur-[130px] top-[10%] left-[5%] z-0"></div>
    <div class="absolute w-[450px] h-[450px] rounded-full bg-yellow-400/5 blur-[130px] bottom-[15%] right-[5%] z-0"></div>

    <div class="container mx-auto px-6 relative z-10">
        <!-- Title Header -->
        <div class="text-center max-w-xl mx-auto mb-12">
            <span class="text-xs font-bold text-yellow-400 uppercase tracking-widest bg-yellow-400/10 border border-yellow-400/20 rounded-full px-4.5 py-1.5">Settings Hub</span>
            <h1 class="text-3xl md:text-4xl font-black text-white mt-4 font-heading tracking-tight">Your <span class="bg-gradient-to-r from-yellow-400 to-amber-500 bg-clip-text text-transparent">Passenger Profile</span></h1>
        </div>

        <!-- Two Column Grid -->
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 max-w-6xl mx-auto">
            
            <!-- Left Column: Modify Profile Form (Lg: col-span-5) -->
            <div class="lg:col-span-5">
                <div class="bg-slate-900/60 backdrop-blur-xl border border-slate-800 p-8 rounded-3xl shadow-2xl">
                    <h2 class="text-lg font-bold text-white mb-2 font-heading tracking-tight flex items-center gap-2 border-b border-slate-800 pb-3 mb-6">
                        <i class="fa-regular fa-id-card text-yellow-400"></i> Modify Specifications
                    </h2>

                    <form th:action="@{/user/profile/update}" method="post" class="flex flex-col gap-4">
                        <div>
                            <label class="block text-[10px] text-slate-450 font-bold mb-1 uppercase tracking-wider">Full Name</label>
                            <input type="text" name="name" th:value="${user.name}" required
                                   class="w-full bg-slate-950 border border-slate-800 focus:border-yellow-400 rounded-xl px-4 py-2.5 text-sm text-white focus:outline-none transition duration-200">
                        </div>

                        <div>
                            <label class="block text-[10px] text-slate-450 font-bold mb-1 uppercase tracking-wider">Email Address</label>
                            <input type="email" name="email" th:value="${user.email}" required
                                   class="w-full bg-slate-950 border border-slate-800 focus:border-yellow-400 rounded-xl px-4 py-2.5 text-sm text-white focus:outline-none transition duration-200">
                        </div>

                        <div>
                            <label class="block text-[10px] text-slate-450 font-bold mb-1 uppercase tracking-wider">Direct Telephone</label>
                            <input type="tel" name="phone" th:value="${user.phone}" required
                                   class="w-full bg-slate-950 border border-slate-800 focus:border-yellow-400 rounded-xl px-4 py-2.5 text-sm text-white focus:outline-none transition duration-200">
                        </div>

                        <div>
                            <label class="block text-[10px] text-slate-450 font-bold mb-1 uppercase tracking-wider">New Password (leave blank to keep)</label>
                            <input type="password" name="password" placeholder="••••••••"
                                   class="w-full bg-slate-950 border border-slate-800 focus:border-yellow-400 rounded-xl px-4 py-2.5 text-sm text-white focus:outline-none transition duration-200">
                        </div>

                        <button type="submit" class="w-full bg-gradient-to-r from-yellow-400 to-amber-500 hover:from-yellow-350 hover:to-amber-450 text-slate-950 font-extrabold text-xs py-3.5 rounded-xl shadow-lg transition duration-200 mt-2 uppercase tracking-wider">
                            Save Changes
                        </button>
                    </form>

                    <div class="border-t border-slate-800 mt-6 pt-6 flex flex-col gap-3">
                        <form th:action="@{/user/delete}" method="post"
                              onsubmit="return confirm('WARNING: Are you absolutely sure you want to permanently delete your passenger profile from TaxiGo? This action is irreversible!');">
                            <button type="submit" class="w-full text-center bg-rose-950/40 hover:bg-rose-900 border border-rose-900/40 hover:border-rose-600 text-rose-450 hover:text-white font-bold py-3 rounded-xl transition duration-200 flex items-center justify-center gap-1.5 text-xs uppercase tracking-wider">
                                <i class="fa-regular fa-trash-can"></i> Delete Account
                            </button>
                        </form>
                    </div>

                    <p class="mt-6 text-center">
                        <a th:href="@{/user/dashboard}" class="text-slate-400 hover:text-white text-xs font-semibold flex items-center justify-center gap-1 transition">
                            <i class="fa-solid fa-arrow-left text-[10px]"></i> Return to Dashboard
                        </a>
                    </p>
                </div>
            </div>

            <!-- Right Column: Active Travel Itineraries (Lg: col-span-7) -->
            <div class="lg:col-span-7">
                <div class="bg-slate-900/60 backdrop-blur-xl border border-slate-800 rounded-3xl p-8 shadow-2xl">
                    <h3 class="text-lg font-bold text-white border-b border-slate-800 pb-4 mb-6 flex items-center gap-2">
                        <i class="fa-solid fa-route text-purple-400"></i> Verified Travel Bookings
                    </h3>

                    <!-- Empty state -->
                    <div th:if="${bookings == null or bookings.isEmpty()}" class="text-slate-500 text-center py-16 border border-dashed border-slate-800 rounded-2xl">
                        <i class="fa-solid fa-car-rear text-4xl mb-4 text-slate-600"></i>
                        <p class="font-medium text-slate-400">No active bookings registered.</p>
                        <a th:href="@{/book-ride}" class="text-yellow-400 hover:text-yellow-300 font-bold inline-flex items-center gap-1.5 mt-4 text-sm transition">
                            Schedule a ride now <i class="fa-solid fa-arrow-right text-xs"></i>
                        </a>
                    </div>

                    <!-- Bookings Itinerary Timeline Loop -->
                    <div th:each="b : ${bookings}" class="group bg-slate-950/40 border border-slate-850 hover:border-slate-800 rounded-2xl p-5 mb-5 last:mb-0 transition duration-200">
                        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                            <div class="flex-1">
                                <div class="flex items-center gap-2 mb-3">
                                    <span class="inline-flex items-center gap-1.5 bg-yellow-400/10 border border-yellow-400/20 text-yellow-400 text-xs px-2.5 py-1 rounded-lg font-bold font-mono" th:text="${b.bookingId}">BK4567</span>
                                    <span th:if="${#strings.equalsIgnoreCase(b.vehicleType, 'premium')}" class="inline-flex items-center gap-1 text-[10px] uppercase font-bold px-2 py-0.5 rounded bg-amber-400/10 text-amber-455 border border-amber-400/20">Luxury Elite</span>
                                    <span th:if="${#strings.equalsIgnoreCase(b.vehicleType, 'xl')}" class="inline-flex items-center gap-1 text-[10px] uppercase font-bold px-2 py-0.5 rounded bg-purple-400/10 text-purple-400 border border-purple-400/20">XL Cruiser</span>
                                    <span th:if="${#strings.equalsIgnoreCase(b.vehicleType, 'standard')}" class="inline-flex items-center gap-1 text-[10px] uppercase font-bold px-2 py-0.5 rounded bg-blue-400/10 text-blue-455 border border-blue-400/20">Sedan Comfort</span>
                                </div>

                                <div class="flex items-start gap-3">
                                    <div class="flex flex-col items-center mt-1">
                                        <i class="fa-solid fa-circle text-xs text-yellow-400 shrink-0"></i>
                                        <div class="w-[2px] h-6 bg-slate-800"></div>
                                        <i class="fa-solid fa-location-dot text-xs text-purple-400 shrink-0"></i>
                                    </div>
                                    <div>
                                        <div class="text-sm font-bold text-white" th:text="${b.pickup}">Colombo Fort</div>
                                        <div class="text-sm font-bold text-slate-300 mt-1" th:text="${b.dropoff}">Mount Lavinia</div>
                                    </div>
                                </div>

                                <div class="flex items-center gap-4 text-xs text-slate-500 mt-4 border-t border-slate-900/60 pt-3">
                                    <span><i class="fa-regular fa-calendar"></i> <span th:text="${#temporals.format(b.pickupDate, 'dd MM yyyy')}">22 05 2026</span></span>
                                    <span>•</span>
                                    <span><i class="fa-regular fa-clock"></i> <span th:text="${b.pickupTime}">13:30</span></span>
                                    <span>•</span>
                                    <span class="text-white font-semibold">Fare: <span class="text-yellow-400" th:text="|LKR ${#numbers.formatDecimal(b.fare, 1, 2)}|">LKR 1,200</span></span>
                                </div>
                            </div>

                            <div class="flex flex-row md:flex-col items-end gap-3 self-stretch md:self-auto justify-between border-t border-slate-900 md:border-t-0 pt-4 md:pt-0">
                                <span class="text-[10px] uppercase font-extrabold px-3 py-1 rounded-full border tracking-wider"
                                      th:classappend="${b.status == 'CANCELLED'} ? 'bg-rose-500/10 text-rose-400 border-rose-500/20' : (${b.status == 'PENDING_PAYMENT'} ? 'bg-amber-500/10 text-amber-400 border-amber-500/20' : 'bg-emerald-500/10 text-emerald-400 border-emerald-500/20')"
                                      th:text="${b.status}">CONFIRMED</span>
                                
                                <a th:if="${b.status == 'PENDING_PAYMENT'}" th:href="@{/payment(bookingId=${b.bookingId})}"
                                   class="text-[10px] bg-yellow-400 hover:bg-yellow-350 text-slate-950 font-bold px-2.5 py-1 rounded-lg flex items-center gap-1 transition">
                                    <i class="fa-solid fa-credit-card"></i> Pay Now
                                </a>
                            </div>
                        </div>
                    </div>

                </div>
            </div>

        </div>
    </div>
</main>
</html>
