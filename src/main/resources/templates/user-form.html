<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head><title>VibeRide</title><link rel="stylesheet" href="/css/style.css"></head><body><div class="container"><h1>Add User</h1><a class="btn secondary" href="/users">Back</a><div class="grid"><div class="card"><h2>Passenger</h2><form action="/users/passenger" method="post"><input name="userId" placeholder="User ID" required><input name="name" placeholder="Name" required><input name="email" type="email" placeholder="Email" required><input name="password" type="password" placeholder="Password" required><input name="phone" placeholder="Phone" required><input name="address" placeholder="Address" required><input name="preferredPayment" placeholder="Preferred Payment" required><button class="btn" type="submit">Save Passenger</button></form></div><div class="card"><h2>Premium Passenger</h2><form action="/users/premium" method="post"><input name="userId" placeholder="User ID" required><input name="name" placeholder="Name" required><input name="email" type="email" placeholder="Email" required><input name="password" type="password" placeholder="Password" required><input name="phone" placeholder="Phone" required><input name="membershipLevel" placeholder="Membership Level" required><input name="discountRate" type="number" step="0.01" placeholder="Discount Rate" required><input name="loyaltyPoints" type="number" placeholder="Loyalty Points" required><button class="btn" type="submit">Save Premium</button></form></div></div></div></body></html>
