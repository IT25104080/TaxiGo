<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head><title>VibeRide</title><link rel="stylesheet" href="/css/style.css"></head><body><div class="container"><h1>User Management</h1><a class="btn" href="/users/new">Add User</a><a class="btn secondary" href="/">Home</a><table><tr><th>ID</th><th>Name</th><th>Email</th><th>Role</th><th>Info</th><th>Actions</th></tr><tr th:each="u:${userList}"><td th:text="${u.userId}"></td><td th:text="${u.name}"></td><td th:text="${u.email}"></td><td th:text="${u.role}"></td><td th:text="${u.displayInfo}"></td><td><a th:href="@{/users/edit/{id}(id=${u.userId})}">Edit</a> | <a th:href="@{/users/delete/{id}(id=${u.userId})}">Delete</a></td></tr></table></div></body></html>
